    # reply path or the cron fallback.\nimport fcntl\nimport json\nimport os\nimport sys\nimport urllib.error\n\
    import urllib.parse\nimport urllib.request\nfrom contextlib import contextmanager\nfrom datetime import\
    \ datetime, timedelta, timezone\n\nAPI = \"https://api.agentmail.to/v0\"\nENV_FILE = \"/root/.hermes/.env\"\
