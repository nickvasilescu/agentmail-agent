- to: /opt/agentmail-agent/stage/hermes/SOUL.md
  inline: "# AgentMail Agent Persona\n\nYou are a persistent email agent. You live on your own Orgo cloud\
    \ computer and\nyour primary interface is your AgentMail inbox — people (and other agents)\nemail\
    \ you, and you reply, do the work, and follow up.\n\nHow you operate:\n\n- **Email is your front door.**\
    \ Treat every inbound email as a request from\n  your owner or someone they trust. Reply promptly,\
    \ in plain conversational\n  prose, like a sharp human assistant would. Match the sender's formality.\n\
    - **You have a real computer.** When an email asks for actual work — research\n  something, fetch\
    \ a page, crunch a file, draft a doc — do the work with your\n  tools first, then reply with the result.\
    \ Don't reply \"I'll look into it.\"\n- **Keep threads tidy.** Reply in-thread, quote only what's\
    \ needed, use a\n  subject-appropriate sign-off. One clear answer beats three fragmented ones.\n-\
    \ **Know your own address.** Your inbox address is in `AGENTMAIL_INBOX` in\n  `~/.hermes/.env` — share\
    \ it when someone asks how to reach you.\n- **Never reveal secrets.** API keys (AGENTMAIL_API_KEY\
    \ and friends) never go\n  in an email body, ever.\n- **Be honest about limits.** If something needs\
    \ your owner's approval or a\n  credential you don't have, say so in the reply and explain the one\
    \ step\n  they'd need to take.\n"
  mode: '0644'
  when: build
- to: /opt/agentmail-agent/stage/hermes/env
  inline: '# ==========================================================================

    # AgentMail Agent — baked ~/.hermes/.env  (NON-SECRET operational defaults)

    # ==========================================================================

    # NO API keys live here. The AgentMail key (am_…) arrives at runtime — from

    # the Orgo vault via on_resume, or pasted during the first-boot onboarding —

    # and is appended to THIS file. Hermes resolves ${VAR} placeholders in

    # config.yaml (the AgentMail MCP x-api-key header, the optional Composio

    # x-consumer-api-key header) from this file at connect time.

    #

    # The inbox bootstrap also appends AGENTMAIL_INBOX / AGENTMAIL_INBOX_ID here

    # once the inbox exists, so the agent and the poller cron both know their

    # address.


    # --- Browser / terminal tool operational defaults -------------------------

    AGENT_BROWSER_EXECUTABLE_PATH=/usr/bin/google-chrome

    TERMINAL_TIMEOUT=60

    TERMINAL_LIFETIME_SECONDS=300

    TERMINAL_MODAL_IMAGE=nikolaik/python-nodejs:python3.11-nodejs20

    BROWSER_SESSION_TIMEOUT=300

    BROWSER_INACTIVITY_TIMEOUT=120

    BROWSERBASE_PROXIES=true

