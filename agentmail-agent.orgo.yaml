    \ daemon=True).start()\n    threading.Thread(target=safety_pass_worker, daemon=True).start()\n\n \
    \   log(\"waiting for AgentMail key + inbox…\")\n    while not (core.key() and core.inbox()):\n  \
    \      time.sleep(IDLE_POLL_S)\n    log(f\"configured for {core.inbox()} — connecting\")\n\n    backoff\
    \ = 1\n    while True:\n        started = time.monotonic()\n        try:\n            listen_once()\n\
    \            log(\"socket closed cleanly\")\n        except Exception as e:  # noqa: BLE001\n    \
    \        log(f\"socket error: {type(e).__name__}: {e}\")\n            if \"certificate\" in str(e).lower()\
    \ or \"ssl\" in type(e).__name__.lower():\n                sync_clock()\n        _connected.clear()\n\
    \        # Stable for 10+ minutes → treat the drop as fresh, reset backoff.\n        if time.monotonic()\
    \ - started > 600:\n            backoff = 1\n        time.sleep(backoff)\n        backoff = min(backoff\
    \ * 2, 60)\n\n\nif __name__ == \"__main__\":\n    main()\n"
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-listener-run.sh
  inline: '#!/bin/bash

    # ==========================================================================

    # AgentMail Agent — WebSocket listener wrapper (supervised service entrypoint)

    # ==========================================================================

    # Mirror of gateway-run.sh: root, both env files bridged, dormant (not

    # crash-looping) until the SDK venv exists, and the process held under a

    # lifetime flock so the duplicate-supervisord boot race can never run two

    # listeners (twin subscriptions → twin responder passes).

    set +e

    export HOME=/root

    export HERMES_HOME=/root/.hermes

    export PATH=/usr/local/bin:/root/.local/bin:/root/.hermes/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH


    VENV_PY=/opt/agentmail-agent/venv/bin/python

    until [ -x "$VENV_PY" ]; do sleep 5; done


    # Source the Orgo vault-injection target (/root/.env — may be absent) and

    # Hermes'' own env so the listener sees the AgentMail key without restarts.

    set -a

    [ -f /root/.env ] && . /root/.env

    [ -f "$HERMES_HOME/.env" ] && . "$HERMES_HOME/.env"

    set +a


    # Self-replace: supervisorctl stop/restart TERMs only the flock wrapper — the

    # python grandchild survives, keeps the lock, and the fresh instance would

    # block on flock forever (field-hit on a live VM). Kill any survivor first;

    # in the duplicate-supervisord race this converges to exactly one listener

    # (loser''s pkill drops the winner''s child, winner''s flock exits and releases,

    # loser acquires and spawns — same net effect as the gateway''s --replace).

    pkill -f ''/usr/local/bin/agentmail-inbox-listener.py'' 2>/dev/null || true

    sleep 1


    # Command-form flock in /var/lib/orgo (NOT /var/lock — dangling symlink on

    # these VMs); same field-tested defense as the gateway wrapper.

    mkdir -p /var/lib/orgo

    exec flock /var/lib/orgo/agentmail-listener.lock "$VENV_PY" /usr/local/bin/agentmail-inbox-listener.py

    '
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-sync-mcp.py
  inline: "#!/usr/bin/env python3\n# ==========================================================================\n\
    # AgentMail Agent — enable MCP servers only when their key exists\n# ==========================================================================\n\
    # The agentmail + composio MCP blocks ship enabled:false. A key-less enabled\n# server costs every\
    \ cron run ~8 seconds of 401→retry→give-up (observed live)\n# and floods errors.log. This script flips\
    \ each server's `enabled` to match\n# key presence; on_resume and the onboarding both call it (before\
    \ the gateway\n# restart they already do), so pasting/vaulting a key is all a user does.\n#\n# Reads\
    \ keys from the process env, falling back to ~/.hermes/.env.\nimport os\n\nimport yaml\n\nCONFIG =\
    \ \"/root/.hermes/config.yaml\"\nENV_FILE = \"/root/.hermes/.env\"\nSERVERS = {\"agentmail\": \"AGENTMAIL_API_KEY\"\
    , \"composio\": \"COMPOSIO_CONSUMER_KEY\"}\n\n\ndef env(name):\n    v = os.environ.get(name, \"\"\
    ).strip()\n    if v:\n        return v\n    try:\n        with open(ENV_FILE) as fh:\n           \
    \ for line in fh:\n                if line.startswith(name + \"=\"):\n                    return line.split(\"\
    =\", 1)[1].strip()\n    except OSError:\n        pass\n    return \"\"\n\n\nwith open(CONFIG) as fh:\n\
    \    cfg = yaml.safe_load(fh)\n\nmcp = cfg.get(\"mcp_servers\") or {}\nchanged = []\nfor server, var\
    \ in SERVERS.items():\n    if server not in mcp:\n        continue\n    want = bool(env(var))\n  \
    \  if bool(mcp[server].get(\"enabled\")) != want:\n        mcp[server][\"enabled\"] = want\n     \
    \   changed.append(f\"{server}={'on' if want else 'off'}\")\n\nif changed:\n    tmp = CONFIG + \"\
    .tmp\"\n    with open(tmp, \"w\") as fh:\n        yaml.safe_dump(cfg, fh, default_flow_style=False,\
    \ sort_keys=False,\n                       allow_unicode=True, width=1000)\n    os.replace(tmp, CONFIG)\n\
    \    os.chmod(CONFIG, 0o600)\n    print(f\"[sync-mcp] {', '.join(changed)} (restart the gateway to\
    \ apply)\")\nelse:\n    print(\"[sync-mcp] no changes\")\n"
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-watchdog.sh
  inline: "#!/bin/bash\n# ==========================================================================\n\
    # AgentMail Agent — responder watchdog (supervised service)\n# ==========================================================================\n\
    # Two independent checks every 120s:\n#\n# 1) Stuck-cron guard. Hermes's cron ticker has an in-flight\
    \ dedupe guard:\n#    while a job's previous run is still executing, new ticks log \"already\n#  \
    \  running — skipping\". Normally correct — but a model call with no timeout\n#    (observed live:\
    \ a chat stream to the inference API that never returned)\n#    wedges the guard FOREVER, and the\
    \ ticker heartbeat stays green the whole\n#    time, so nothing else notices. Restart the gateway\
    \ only on that exact\n#    signature: consecutive \"already running\" skips AND no run output\n# \
    \   recently (window sized for the 5-minute fallback schedule).\n#\n# 2) Stale listener guard (0.2.0).\
    \ The WebSocket listener owns a heartbeat\n#    file while connected. If the AgentMail key + inbox\
    \ exist but the\n#    heartbeat has been stale >5 min, the listener is wedged in-process (its\n# \
    \   own backoff loop can't fix a generator blocked on a half-open socket) —\n#    restart it. Rate-limited\
    \ so an AgentMail outage doesn't cause restart\n#    storms (the cron fallback is covering the inbox\
    \ meanwhile).\nset +e\nLOG=/root/.hermes/logs/agent.log\nOUT=/root/.hermes/cron/output/agentmail-inb01\n\
    ENVF=/root/.hermes/.env\nHB=/root/.hermes/state/agentmail_listener_heartbeat\nWLOG=/var/log/orgo/agentmail-watchdog.log\n\
    LAST_KICK=0\nmkdir -p /var/log/orgo\n\nwhile true; do\n  sleep 120\n\n  # ---- 1) stuck cron run →\
    \ gateway restart --------------------------------\n  if [ -f /root/.hermes/cron/jobs.json ] && \\\
    \n     grep -q 'agentmail-inb01' /root/.hermes/cron/jobs.json 2>/dev/null; then\n    SKIPS=$(tail\
    \ -n 6 \"$LOG\" 2>/dev/null | grep -c 'already running')\n    # A healthy 5-min job writes one output\
    \ file per tick; 16 min ≈ 3 ticks.\n    RECENT=$(find \"$OUT\" -name '*.md' -mmin -16 2>/dev/null\
    \ | wc -l)\n    if [ \"$SKIPS\" -ge 3 ] && [ \"$RECENT\" -eq 0 ]; then\n      echo \"$(date -Is) stuck\
    \ in-flight guard (skips=$SKIPS, no output 16m) — restarting gateway\" >> \"$WLOG\"\n      if ! supervisorctl\
    \ restart hermes-gateway >> \"$WLOG\" 2>&1; then\n        # supervisorctl can lose its socket (field-tested:\
    \ a duplicate-\n        # supervisord boot where the socket owner died). Killing the gateway\n   \
    \     # works regardless: whichever supervisor owns it has restart:always.\n        echo \"$(date\
    \ -Is) supervisorctl failed — pkill fallback\" >> \"$WLOG\"\n        pkill -f 'hermes gateway run'\
    \ >> \"$WLOG\" 2>&1\n      fi\n      sleep 300\n      continue\n    fi\n  fi\n\n  # ---- 2) stale\
    \ listener heartbeat → listener restart ----------------------\n  grep -q '^AGENTMAIL_API_KEY=..'\
    \ \"$ENVF\" 2>/dev/null || continue\n  grep -q '^AGENTMAIL_INBOX' \"$ENVF\" 2>/dev/null || continue\n\
    \  NOW=$(date +%s)\n  HB_AGE=$(( NOW - $(stat -c %Y \"$HB\" 2>/dev/null || echo 0) ))\n  [ \"$HB_AGE\"\
    \ -gt 300 ] || continue\n  [ $(( NOW - LAST_KICK )) -gt 600 ] || continue\n  LAST_KICK=$NOW\n  echo\
    \ \"$(date -Is) listener heartbeat stale (${HB_AGE}s) — restarting agentmail-listener\" >> \"$WLOG\"\
    \n  if ! supervisorctl restart agentmail-listener >> \"$WLOG\" 2>&1; then\n    echo \"$(date -Is)\
    \ supervisorctl failed — pkill fallback\" >> \"$WLOG\"\n    pkill -f 'agentmail-inbox-listener.py'\
    \ >> \"$WLOG\" 2>&1\n  fi\ndone\n"
  mode: '0755'
  when: build
- to: /root/Desktop/AgentMailSetup.desktop
  inline: '[Desktop Entry]

    Type=Application

    Name=AgentMail Agent Setup

    Comment=Finish setting up your email agent (Nous sign-in + AgentMail key)

    Exec=/usr/local/bin/agentmail-onboard-launch.sh

    Icon=mail-message-new

    Terminal=false

    '
  mode: '0755'
  when: build
apps:
- name: hermes-gateway
  title: Hermes Gateway
  description: Hermes gateway daemon — the AgentMail MCP connection and the cron scheduler running the
    5-minute fallback poller behind the WebSocket inbox listener.
  install: "set -e\nexport DEBIAN_FRONTEND=noninteractive\nexport HOME=/root\nexport HERMES_HOME=/root/.hermes\n\
    export PATH=/usr/local/bin:/root/.hermes/bin:/root/.hermes/node/bin:/root/.local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH\n\
    \n# 1) Hermes Agent — non-interactive, no wizard, no Playwright.\n#    git/ripgrep/ffmpeg are already\
    \ apt-installed (build.apt), so the installer\n#    takes no apt path here; Node is auto-provisioned\
    \ if the base lacks it.\ncurl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s --\
    \ --non-interactive --skip-setup --skip-browser\nhash -r || true\n\n# 2) Place staged Hermes config/persona/env/skill\
    \ AFTER the install so our\n#    files always win over anything the installer wrote.\nmkdir -p /root/.hermes/skills\
    \ /root/.hermes/memories /root/.hermes/state \\\n         /var/log/orgo /var/lib/orgo\ncp -f  /opt/agentmail-agent/stage/hermes/config.yaml\
    \ /root/.hermes/config.yaml\ncp -f  /opt/agentmail-agent/stage/hermes/SOUL.md     /root/.hermes/SOUL.md\n\
    cp -f  /opt/agentmail-agent/stage/hermes/env         /root/.hermes/.env\ncp -rf /opt/agentmail-agent/stage/hermes/skills/.\
    \    /root/.hermes/skills/\nchmod 600 /root/.hermes/config.yaml /root/.hermes/.env\n\n# 3) Desktop\
    \ wallpaper (decode the baked base64).\nmkdir -p /usr/share/backgrounds\nbase64 -d /opt/agentmail-agent/wallpaper.b64\
    \ > /usr/share/backgrounds/wallpaper.jpg\n\n# 4) Dedicated venv for the AgentMail SDK (WebSocket listener\
    \ only — the\n#    reply/ledger path stays stdlib REST). The base image has no pip, but the\n#   \
    \ Hermes installer ships uv; `uv venv` needs no python3-venv/ensurepip and\n#    the SDK deps are\
    \ pure wheels — zero apt, zero libssl/supervisord risk.\nUV=\"$(command -v uv || echo /root/.hermes/bin/uv)\"\
    \n\"$UV\" venv /opt/agentmail-agent/venv\nfor i in 1 2 3; do\n  \"$UV\" pip install --python /opt/agentmail-agent/venv/bin/python\
    \ \"agentmail==0.5.6\" && break\n  sleep 5\ndone\n# Import self-test: a broken SDK install must fail\
    \ the build LOUDLY here,\n# not ship a silently dead listener.\n/opt/agentmail-agent/venv/bin/python\
    \ -c \"from agentmail import AgentMail, Subscribe, MessageReceivedEvent\" \\\n  || { echo \"agentmail\
    \ SDK import self-test FAILED\"; exit 1; }\n\necho \"agentmail-agent install complete\""
  services:
  - name: hermes-gateway
    title: Hermes gateway
    run: /usr/local/bin/hermes-gateway-run.sh
    user: root
    restart: always
  - name: agentmail-watchdog
    title: Responder watchdog
    run: /usr/local/bin/agentmail-watchdog.sh
    user: root
    restart: always
  - name: agentmail-listener
    title: AgentMail WebSocket listener
    run: /usr/local/bin/agentmail-listener-run.sh
    user: root
    restart: always
  autostart:
  - run: /usr/local/bin/agentmail-onboard-launch.sh
    delay: 10
hooks:
  on_first_boot: 'mkdir -p /var/lib/orgo /var/log/orgo /root/.hermes/memories /root/.hermes/state

    [ -f /var/lib/orgo/agentmail-agent.stamp ] || echo "agentmail-agent first boot $(date -Iseconds)"
    > /var/lib/orgo/agentmail-agent.stamp

    # Lean + supervisord-safe (this also runs during the build). No hermes calls.'
  on_resume: "# Fix any fresh-VM clock skew before the agent touches the network (SSL).\ndate -s \"$(curl\
    \ -sI http://www.google.com | awk 'tolower($1)==\"date:\"{sub($1 FS,\"\");print}')\" 2>/dev/null ||\
    \ true\n\nset -a; [ -f /root/.env ] && . /root/.env; [ -f /root/.hermes/.env ] && . /root/.hermes/.env;\
    \ set +a\nmkdir -p /root/.hermes /root/.hermes/state\nE=/root/.hermes/.env; touch \"$E\"\n\n# Bridge\
    \ any Orgo-vault-injected secrets into the file Hermes actually reads.\n# Idempotent strip-then-append;\
    \ vault UPPER_SNAKE names == the keys config wants.\nfor K in AGENTMAIL_API_KEY COMPOSIO_CONSUMER_KEY;\
    \ do\n  V=\"$(printenv \"$K\" 2>/dev/null || true)\"\n  [ -z \"$V\" ] && continue\n  grep -vE \"^${K}=\"\
    \ \"$E\" > \"$E.tmp\" 2>/dev/null || true\n  mv \"$E.tmp\" \"$E\"\n  echo \"${K}=${V}\" >> \"$E\"\n\
    done\nchmod 600 \"$E\"\n\n# Create the agent's inbox the moment a key exists (idempotent, no-op without\n\
    # one), re-source the env it pinned, then seed the 1-minute inbox responder.\nset -a; . \"$E\"; set\
    \ +a\npython3 /usr/local/bin/agentmail-bootstrap-inbox.py || true\nset -a; . \"$E\"; set +a\npython3\
    \ /usr/local/bin/agentmail-seed-inbox-cron.py || true\n\n# Initialize the dedupe ledger immediately\
    \ so mail arriving before the first\n# poller tick is treated as new, never absorbed as backlog.\n\
    [ -n \"$AGENTMAIL_INBOX_ID\" ] && python3 /usr/local/bin/agentmail-inbox-helper.py poll >/dev/null\
    \ 2>&1 || true\n\n# Enable/disable the agentmail+composio MCP servers to match key presence\n# (a\
    \ key-less enabled server costs every cron run ~8s of 401 retries).\npython3 /usr/local/bin/agentmail-sync-mcp.py\
    \ || true\n\n# Restart the gateway so it re-reads .env + config (Hermes has no hot reload).\nsupervisorctl\
    \ restart hermes-gateway 2>/dev/null || true\n# Kick the WebSocket listener too so a vault-injected\
    \ key is picked up\n# immediately (it would otherwise wait for its 10s idle poll).\nsupervisorctl\
    \ restart agentmail-listener 2>/dev/null || true"
  on_every_boot: "export DISPLAY=\"${DISPLAY:-:99}\"\nWP=/usr/share/backgrounds/wallpaper.jpg\n[ -f \"\
    $WP\" ] || exit 0\nfor p in $(xfconf-query -c xfce4-desktop -l 2>/dev/null | grep -E 'last-image|image-path');\
    \ do\n  xfconf-query -c xfce4-desktop -p \"$p\" -s \"$WP\" 2>/dev/null || true\ndone\nxfconf-query\
    \ -c xfce4-desktop -p /backdrop/screen0/monitor0/image-path -s \"$WP\" --create -t string 2>/dev/null\
    \ || true"
terminal:
- name: hermes
  title: Hermes
  description: Host shell for the email agent (hermes auth, logs, config).
  cwd: /root
