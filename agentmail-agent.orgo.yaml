    \ Subscribe, Subscribed\n\n    client = AgentMail(api_key=core.key())\n    inbox_id = core.inbox()\n\
    \    with client.websockets.connect() as socket:\n        socket.send_subscribe(Subscribe(inbox_ids=[inbox_id]))\n\
    \        for event in socket:\n            if isinstance(event, Subscribed):\n                log(f\"\
