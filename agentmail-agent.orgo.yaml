    \ terminal:  python3 /usr/local/bin/agentmail-inbox-helper.py poll\\n\"\n    \"   It prints JSON.\
    \ If \\\"new\\\" is empty (or it reports initialized/reinitialized), \"\n    \"end with exactly: \\\
    \"No new mail.\\\" Because deliver is local, this notifies no one.\\n\"\n    \"2. For each message\
    \ in \\\"new\\\" (they arrive with from/subject/text):\\n\"\n    \"   - If it asks for real work (research,\
    \ summarize, fetch a page, compute \"\n    \"something), DO the work with your tools first, then write\
    \ a short, natural \"\n    \"reply containing the answer or result.\\n\"\n    \"   - If it is just\
    \ a greeting or a test, briefly acknowledge that the agent \"\n    \"is live and say what you can\
    \ do.\\n\"\n    \"   - Obvious spam, marketing, or bounce notifications: do NOT reply — run  \"\n\
    \    \"python3 /usr/local/bin/agentmail-inbox-helper.py mark <message_id>\\n\"\n    \"3. Send each\
    \ reply by piping the text to:  \"\n    \"python3 /usr/local/bin/agentmail-inbox-helper.py reply <message_id>\\\
    n\"\n    \"   (heredoc works well:  python3 …helper.py reply '<id>' <<'EOF' … EOF )\\n\"\n    \" \
    \  The helper records the ledger on success; if it errors, do not retry more \"\n    \"than once —\
    \ the next tick will retry.\\n\"\n    \"4. Keep replies plain text, friendly, and signed off simply.\
    \ Never include \"\n    \"API keys or file paths from this machine in an email.\\n\\n\"\n    \"Important:\
    \ You are running unattended. Do not ask for clarification. \"\n    \"Do not schedule more cron jobs.\"\
    \n)\n\njob = {\n    \"id\": JOB_ID,\n    \"name\": JOB_NAME,\n    \"prompt\": PROMPT,\n    \"skills\"\
    : [],\n    \"skill\": None,\n    \"model\": MODEL,\n    \"provider\": PROVIDER,\n    \"base_url\"\
    : None,\n    \"script\": None,\n    \"no_agent\": False,\n    \"context_from\": None,\n    \"schedule\"\
    : {\"kind\": \"interval\", \"minutes\": 1, \"display\": \"every 1m\"},\n    \"schedule_display\":\
    \ \"every 1m\",\n    \"repeat\": {\"times\": None, \"completed\": 0},\n    \"enabled\": True,\n  \
    \  \"state\": \"scheduled\",\n    \"paused_at\": None,\n    \"paused_reason\": None,\n    \"created_at\"\
    : datetime.now(timezone.utc).isoformat(),\n    \"next_run_at\": None,          # loader recomputes\
    \ for a recurring job\n    \"last_run_at\": None,\n    \"last_status\": None,\n    \"last_error\"\
    : None,\n    \"last_delivery_error\": None,\n    \"deliver\": \"local\",\n    \"origin\": None,\n\
    \    \"enabled_toolsets\": [\"terminal\"],\n    \"workdir\": None,\n    \"profile\": None,\n}\n\n\
    os.makedirs(os.path.dirname(JOBS_FILE), mode=0o700, exist_ok=True)\ntry:\n    with open(JOBS_FILE)\
    \ as fh:\n        data = json.load(fh)\n    if not isinstance(data, dict):\n        data = {\"jobs\"\
    : data if isinstance(data, list) else []}\nexcept (FileNotFoundError, json.JSONDecodeError):\n   \
    \ data = {\"jobs\": []}\n\njobs = data.get(\"jobs\", [])\nif any(j.get(\"name\") == JOB_NAME for j\
    \ in jobs):\n    print(\"[seed-inbox-cron] inbox auto-responder already present — leaving as-is.\"\
    )\n    sys.exit(0)\n\njobs.append(job)\ndata[\"jobs\"] = jobs\ndata[\"updated_at\"] = datetime.now(timezone.utc).isoformat()\n\
    \ntmp = JOBS_FILE + \".tmp\"\nwith open(tmp, \"w\") as fh:\n    json.dump(data, fh, indent=2)\nos.replace(tmp,\
    \ JOBS_FILE)\nos.chmod(JOBS_FILE, 0o600)\nos.chmod(os.path.dirname(JOBS_FILE), 0o700)\nprint(\"[seed-inbox-cron]\
    \ Seeded agentmail-inbox-auto-responder (every 1m, deliver local).\")\n"
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-inbox-helper.py
  inline: "#!/usr/bin/env python3\n# ==========================================================================\n\
    # AgentMail Agent — deterministic inbox helper (the cron job's hands)\n# ==========================================================================\n\
    # The 1-minute auto-responder cron delegates ALL mechanical work here so the\n# LLM never re-implements\
    \ polling/ledger code (that's how ledgers get\n# corrupted). The model only decides WHAT to reply;\
    \ this script decides what\n# is new, guards against backlog-replies, and performs the sends.\n#\n\
    #   agentmail-inbox-helper poll\n#       → JSON to stdout:\n#         {\"initialized\": N}       \
    \                first run / ledger reset\n#         {\"new\": [{message_id, thread_id, from, subject,\
    \ timestamp, text}]}\n#         {\"new\": []}                              nothing to do\n#   agentmail-inbox-helper\
    \ reply <message_id>      reply text on stdin\n#       → sends the reply; on 2xx records the id in\
    \ the ledger\n#   agentmail-inbox-helper mark <message_id>       record WITHOUT replying\n#      \
    \ → for spam / bounces / stale mail\n#\n# Reads AGENTMAIL_API_KEY + AGENTMAIL_INBOX_ID from the environment,\
    \ falling\n# back to parsing /root/.hermes/.env directly (cron contexts don't source it).\n# Ledger:\
    \ /root/.hermes/state/agentmail_inbox_processed.json =\n# {\"processed_ids\": [\"<message_id>\", ...]}\
    \ — written atomically, never any\n# other schema.\nimport json\nimport os\nimport sys\nimport urllib.error\n\
    import urllib.parse\nimport urllib.request\nfrom datetime import datetime, timedelta, timezone\n\n\
    API = \"https://api.agentmail.to/v0\"\nENV_FILE = \"/root/.hermes/.env\"\nLEDGER = \"/root/.hermes/state/agentmail_inbox_processed.json\"\
    \nUA = \"orgo-agentmail-agent/0.1 (+https://orgo.ai)\"\nMAX_REPLIES_PER_TICK = 3\nSTALE_HOURS = 48\n\
    \n\ndef env(name):\n    v = os.environ.get(name, \"\").strip()\n    if v:\n        return v\n    try:\n\
    \        with open(ENV_FILE) as fh:\n            for line in fh:\n                if line.startswith(name\
    \ + \"=\"):\n                    return line.split(\"=\", 1)[1].strip()\n    except OSError:\n   \
    \     pass\n    return \"\"\n\n\nKEY = env(\"AGENTMAIL_API_KEY\")\nINBOX = env(\"AGENTMAIL_INBOX_ID\"\
    ) or env(\"AGENTMAIL_INBOX\")\n\n\ndef die(msg):\n    print(json.dumps({\"error\": msg}))\n    sys.exit(1)\n\
    \n\ndef call(method, path, body=None):\n    req = urllib.request.Request(\n        API + path,\n \
    \       data=json.dumps(body).encode() if body is not None else None,\n        method=method,\n  \
    \      headers={\"Authorization\": f\"Bearer {KEY}\",\n                 \"Content-Type\": \"application/json\"\
    ,\n                 \"User-Agent\": UA},\n    )\n    with urllib.request.urlopen(req, timeout=30)\
    \ as resp:\n        return json.load(resp)\n\n\ndef load_ledger():\n    # An EMPTY list is valid —\
    \ a brand-new inbox has zero backlog at init\n    # time, and treating empty-as-corrupt made the next\
    \ poll \"re-initialize\"\n    # the user's first email into the backlog (field-tested, twice). Only\
    \ a\n    # missing file, unparseable JSON, or a wrong schema triggers init; the\n    # >5-new flood\
    \ guard in cmd_poll covers genuine corruption.\n    try:\n        with open(LEDGER) as fh:\n     \
    \       d = json.load(fh)\n        ids = d.get(\"processed_ids\")\n        if isinstance(ids, list):\n\
    \            return set(ids)\n    except (OSError, json.JSONDecodeError, AttributeError):\n      \
    \  pass\n    return None  # missing/unparseable/wrong-schema → caller must initialize\n\n\ndef save_ledger(ids):\n\
    \    os.makedirs(os.path.dirname(LEDGER), exist_ok=True)\n    tmp = LEDGER + \".tmp\"\n    with open(tmp,\
    \ \"w\") as fh:\n        json.dump({\"processed_ids\": sorted(ids)}, fh, indent=1)\n    os.replace(tmp,\
    \ LEDGER)\n\n\ndef fetch_received():\n    q = urllib.parse.quote(INBOX)\n    d = call(\"GET\", f\"\
    /inboxes/{q}/messages?limit=20&labels=received\")\n    return d.get(\"messages\", [])\n\n\ndef parse_ts(ts):\n\
    \    try:\n        return datetime.fromisoformat(str(ts).replace(\"Z\", \"+00:00\"))\n    except ValueError:\n\
    \        return None\n\n\ndef cmd_poll():\n    msgs = fetch_received()\n    ledger = load_ledger()\n\
    \    if ledger is None:\n        save_ledger({m[\"message_id\"] for m in msgs})\n        print(json.dumps({\"\
    initialized\": len(msgs), \"new\": []}))\n        return\n\n    fresh = [m for m in msgs if m.get(\"\
    message_id\") not in ledger]\n    # Oldest first so conversations stay ordered.\n    fresh.sort(key=lambda\
    \ m: str(m.get(\"timestamp\", \"\")))\n\n    # Guard: a flood of \"new\" mail means a broken ledger,\
    \ not real traffic.\n    if len(fresh) > 5:\n        save_ledger(ledger | {m[\"message_id\"] for m\
    \ in msgs})\n        print(json.dumps({\"reinitialized\": len(fresh), \"new\": []}))\n        return\n\
    \n    now = datetime.now(timezone.utc)\n    out = []\n    for m in fresh:\n        ts = parse_ts(m.get(\"\
    timestamp\"))\n        if ts and now - ts > timedelta(hours=STALE_HOURS):\n            ledger.add(m[\"\
    message_id\"])          # stale → never auto-reply\n            continue\n        if len(out) >= MAX_REPLIES_PER_TICK:\n\
    \            break                                # rest picked up next tick\n        q = urllib.parse.quote(INBOX)\n\
    \        try:\n            full = call(\"GET\", f\"/inboxes/{q}/messages/\"\n                    \
    \           f\"{urllib.parse.quote(m['message_id'])}\")\n        except Exception:  # noqa: BLE001\n\
    \            full = m\n        out.append({\n            \"message_id\": m.get(\"message_id\"),\n\
    \            \"thread_id\": m.get(\"thread_id\"),\n            \"from\": full.get(\"from\") or m.get(\"\
    from\"),\n            \"subject\": full.get(\"subject\") or m.get(\"subject\"),\n            \"timestamp\"\
    : m.get(\"timestamp\"),\n            \"text\": (full.get(\"extracted_text\") or full.get(\"text\"\
    )\n                     or m.get(\"preview\") or \"\")[:4000],\n        })\n    save_ledger(ledger)\n\
    \    print(json.dumps({\"new\": out}, indent=1))\n\n\ndef cmd_reply(message_id):\n    text = sys.stdin.read().strip()\n\
    \    if not text:\n        die(\"empty reply text on stdin\")\n    q = urllib.parse.quote(INBOX)\n\
    \    try:\n        call(\"POST\", f\"/inboxes/{q}/messages/{urllib.parse.quote(message_id)}/reply\"\
    ,\n             {\"text\": text})\n    except urllib.error.HTTPError as e:\n        die(f\"reply failed:\
    \ HTTP {e.code}\")\n    ledger = load_ledger() or set()\n    ledger.add(message_id)\n    save_ledger(ledger)\n\
    \    print(json.dumps({\"replied\": message_id}))\n\n\ndef cmd_mark(message_id):\n    ledger = load_ledger()\
    \ or set()\n    ledger.add(message_id)\n    save_ledger(ledger)\n    print(json.dumps({\"marked\"\
    : message_id}))\n\n\ndef main():\n    if not KEY:\n        die(\"AGENTMAIL_API_KEY not set\")\n  \
    \  if not INBOX:\n        die(\"AGENTMAIL_INBOX_ID not set\")\n    args = sys.argv[1:]\n    if args[:1]\
    \ == [\"poll\"]:\n        cmd_poll()\n    elif args[:1] == [\"reply\"] and len(args) == 2:\n     \
    \   cmd_reply(args[1])\n    elif args[:1] == [\"mark\"] and len(args) == 2:\n        cmd_mark(args[1])\n\
    \    else:\n        die(\"usage: agentmail-inbox-helper poll | reply <message_id> | mark <message_id>\"\
    )\n\n\nif __name__ == \"__main__\":\n    main()\n"
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-sync-mcp.py
  inline: "#!/usr/bin/env python3\n# ==========================================================================\n\
    # AgentMail Agent — enable MCP servers only when their key exists\n# ==========================================================================\n\
    # The agentmail + composio MCP blocks ship enabled:false. A key-less enabled\n# server costs every\
    \ cron run ~8 seconds of 401→retry→give-up (observed live)\n# and floods errors.log. This script flips\
    \ each server's `enabled` to match\n# key presence; on_resume and the onboarding both call it (before\
    \ the gateway\n# restart they already do), so pasting/vaulting a key is all a user does.\n#\n# Reads\
    \ keys from the process env, falling back to ~/.hermes/.env.\nimport os\n\nimport yaml\n\nCONFIG =\
    \ \"/root/.hermes/config.yaml\"\nENV_FILE = \"/root/.hermes/.env\"\nSERVERS = {\"agentmail\": \"AGENTMAIL_API_KEY\"\
    , \"composio\": \"COMPOSIO_CONSUMER_KEY\"}\n\n\ndef env(name):\n    v = os.environ.get(name, \"\"\
    ).strip()\n    if v:\n        return v\n    try:\n        with open(ENV_FILE) as fh:\n           \
    \ for line in fh:\n                if line.startswith(name + \"=\"):\n                    return line.split(\"\
    =\", 1)[1].strip()\n    except OSError:\n        pass\n    return \"\"\n\n\nwith open(CONFIG) as fh:\n\
    \    cfg = yaml.safe_load(fh)\n\nmcp = cfg.get(\"mcp_servers\") or {}\nchanged = []\nfor server, var\
    \ in SERVERS.items():\n    if server not in mcp:\n        continue\n    want = bool(env(var))\n  \
    \  if bool(mcp[server].get(\"enabled\")) != want:\n        mcp[server][\"enabled\"] = want\n     \
    \   changed.append(f\"{server}={'on' if want else 'off'}\")\n\nif changed:\n    tmp = CONFIG + \"\
    .tmp\"\n    with open(tmp, \"w\") as fh:\n        yaml.safe_dump(cfg, fh, default_flow_style=False,\
    \ sort_keys=False,\n                       allow_unicode=True, width=1000)\n    os.replace(tmp, CONFIG)\n\
    \    os.chmod(CONFIG, 0o600)\n    print(f\"[sync-mcp] {', '.join(changed)} (restart the gateway to\
    \ apply)\")\nelse:\n    print(\"[sync-mcp] no changes\")\n"
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-watchdog.sh
  inline: "#!/bin/bash\n# ==========================================================================\n\
    # AgentMail Agent — cron stuck-run watchdog (supervised service)\n# ==========================================================================\n\
    # Hermes's cron ticker has an in-flight dedupe guard: while a job's previous\n# run is still executing,\
    \ new ticks log \"already running — skipping\". Normally\n# correct — but a model call with no timeout\
    \ (observed live: a chat stream to\n# the inference API that never returned) wedges the guard FOREVER,\
    \ and the\n# ticker heartbeat stays green the whole time, so nothing else notices.\n#\n# This watchdog\
    \ restarts the gateway only on that exact signature: the last\n# few ticker lines are all \"already\
    \ running\" skips for our job AND no run\n# output has been produced recently. A restart clears the\
    \ guard (the dedupe\n# set is in-process); the ledger and job survive, and the next tick resumes\n\
    # replying — including anything that queued up while wedged.\nset +e\nLOG=/root/.hermes/logs/agent.log\n\
    OUT=/root/.hermes/cron/output/agentmail-inb01\nWLOG=/var/log/orgo/agentmail-watchdog.log\nmkdir -p\
    \ /var/log/orgo\n\nwhile true; do\n  sleep 120\n  [ -f /root/.hermes/cron/jobs.json ] || continue\n\
    \  grep -q 'agentmail-inb01' /root/.hermes/cron/jobs.json 2>/dev/null || continue\n\n  # Signature\
    \ 1: ≥3 consecutive \"already running — skipping\" ticker lines.\n  SKIPS=$(tail -n 6 \"$LOG\" 2>/dev/null\
    \ | grep -c 'already running')\n  [ \"$SKIPS\" -ge 3 ] || continue\n\n  # Signature 2: no run output\
    \ in the last 5 minutes (a healthy 1-min job\n  # writes one file per run) — guards against acting\
    \ on stale log tails.\n  RECENT=$(find \"$OUT\" -name '*.md' -mmin -5 2>/dev/null | wc -l)\n  [ \"\
    $RECENT\" -eq 0 ] || continue\n\n  echo \"$(date -Is) stuck in-flight guard (skips=$SKIPS, no output\
    \ 5m) — restarting gateway\" >> \"$WLOG\"\n  if ! supervisorctl restart hermes-gateway >> \"$WLOG\"\
    \ 2>&1; then\n    # supervisorctl can lose its socket (field-tested: a duplicate-supervisord\n   \
    \ # boot where the socket owner died). Killing the gateway works regardless:\n    # whichever supervisor\
    \ owns it has restart:always and revives it clean.\n    echo \"$(date -Is) supervisorctl failed —\
    \ pkill fallback\" >> \"$WLOG\"\n    pkill -f 'hermes gateway run' >> \"$WLOG\" 2>&1\n  fi\n  sleep\
    \ 300\ndone\n"
  mode: '0755'
  when: build
- to: /root/Desktop/AgentMailSetup.desktop
  inline: '[Desktop Entry]

    Type=Application

    Name=AgentMail Agent Setup

    Comment=Finish setting up your email agent (Nous sign-in + AgentMail key)

    Exec=/usr/local/bin/agentmail-onboard-launch.sh

    Icon=mail-message-new

    Terminal=false

    '
  mode: '0755'
  when: build
apps:
- name: hermes-gateway
  title: Hermes Gateway
  description: Hermes gateway daemon — the AgentMail MCP connection and the cron scheduler running the
    1-minute inbox auto-responder.
  install: "set -e\nexport DEBIAN_FRONTEND=noninteractive\nexport HOME=/root\nexport HERMES_HOME=/root/.hermes\n\
    export PATH=/usr/local/bin:/root/.hermes/bin:/root/.hermes/node/bin:/root/.local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH\n\
    \n# 1) Hermes Agent — non-interactive, no wizard, no Playwright.\n#    git/ripgrep/ffmpeg are already\
    \ apt-installed (build.apt), so the installer\n#    takes no apt path here; Node is auto-provisioned\
    \ if the base lacks it.\ncurl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s --\
    \ --non-interactive --skip-setup --skip-browser\nhash -r || true\n\n# 2) Place staged Hermes config/persona/env/skill\
    \ AFTER the install so our\n#    files always win over anything the installer wrote.\nmkdir -p /root/.hermes/skills\
    \ /root/.hermes/memories /root/.hermes/state \\\n         /var/log/orgo /var/lib/orgo\ncp -f  /opt/agentmail-agent/stage/hermes/config.yaml\
    \ /root/.hermes/config.yaml\ncp -f  /opt/agentmail-agent/stage/hermes/SOUL.md     /root/.hermes/SOUL.md\n\
    cp -f  /opt/agentmail-agent/stage/hermes/env         /root/.hermes/.env\ncp -rf /opt/agentmail-agent/stage/hermes/skills/.\
    \    /root/.hermes/skills/\nchmod 600 /root/.hermes/config.yaml /root/.hermes/.env\n\n# 3) Desktop\
    \ wallpaper (decode the baked base64).\nmkdir -p /usr/share/backgrounds\nbase64 -d /opt/agentmail-agent/wallpaper.b64\
    \ > /usr/share/backgrounds/wallpaper.jpg\n\necho \"agentmail-agent install complete\""
  services:
  - name: hermes-gateway
    title: Hermes gateway
    run: /usr/local/bin/hermes-gateway-run.sh
    user: root
    restart: always
  - name: agentmail-watchdog
    title: Cron stuck-run watchdog
    run: /usr/local/bin/agentmail-watchdog.sh
    user: root
    restart: always
  autostart:
  - run: /usr/local/bin/agentmail-onboard-launch.sh
    delay: 10
hooks:
  on_first_boot: 'mkdir -p /var/lib/orgo /var/log/orgo /root/.hermes/memories /root/.hermes/state

    [ -f /var/lib/orgo/agentmail-agent.stamp ] || echo "agentmail-agent first boot $(date -Iseconds)"
    > /var/lib/orgo/agentmail-agent.stamp

    # Lean + supervisord-safe (this also runs during the build). No hermes calls.'
  on_resume: "# Fix any fresh-VM clock skew before the agent touches the network (SSL).\ndate -s \"$(curl\
    \ -sI http://www.google.com | awk 'tolower($1)==\"date:\"{sub($1 FS,\"\");print}')\" 2>/dev/null ||\
    \ true\n\nset -a; [ -f /root/.env ] && . /root/.env; [ -f /root/.hermes/.env ] && . /root/.hermes/.env;\
    \ set +a\nmkdir -p /root/.hermes /root/.hermes/state\nE=/root/.hermes/.env; touch \"$E\"\n\n# Bridge\
    \ any Orgo-vault-injected secrets into the file Hermes actually reads.\n# Idempotent strip-then-append;\
    \ vault UPPER_SNAKE names == the keys config wants.\nfor K in AGENTMAIL_API_KEY COMPOSIO_CONSUMER_KEY;\
    \ do\n  V=\"$(printenv \"$K\" 2>/dev/null || true)\"\n  [ -z \"$V\" ] && continue\n  grep -vE \"^${K}=\"\
    \ \"$E\" > \"$E.tmp\" 2>/dev/null || true\n  mv \"$E.tmp\" \"$E\"\n  echo \"${K}=${V}\" >> \"$E\"\n\
    done\nchmod 600 \"$E\"\n\n# Create the agent's inbox the moment a key exists (idempotent, no-op without\n\
    # one), re-source the env it pinned, then seed the 1-minute inbox responder.\nset -a; . \"$E\"; set\
    \ +a\npython3 /usr/local/bin/agentmail-bootstrap-inbox.py || true\nset -a; . \"$E\"; set +a\npython3\
    \ /usr/local/bin/agentmail-seed-inbox-cron.py || true\n\n# Initialize the dedupe ledger immediately\
    \ so mail arriving before the first\n# poller tick is treated as new, never absorbed as backlog.\n\
    [ -n \"$AGENTMAIL_INBOX_ID\" ] && python3 /usr/local/bin/agentmail-inbox-helper.py poll >/dev/null\
    \ 2>&1 || true\n\n# Enable/disable the agentmail+composio MCP servers to match key presence\n# (a\
    \ key-less enabled server costs every cron run ~8s of 401 retries).\npython3 /usr/local/bin/agentmail-sync-mcp.py\
    \ || true\n\n# Restart the gateway so it re-reads .env + config (Hermes has no hot reload).\nsupervisorctl\
    \ restart hermes-gateway 2>/dev/null || true"
  on_every_boot: "export DISPLAY=\"${DISPLAY:-:99}\"\nWP=/usr/share/backgrounds/wallpaper.jpg\n[ -f \"\
    $WP\" ] || exit 0\nfor p in $(xfconf-query -c xfce4-desktop -l 2>/dev/null | grep -E 'last-image|image-path');\
    \ do\n  xfconf-query -c xfce4-desktop -p \"$p\" -s \"$WP\" 2>/dev/null || true\ndone\nxfconf-query\
    \ -c xfce4-desktop -p /backdrop/screen0/monitor0/image-path -s \"$WP\" --create -t string 2>/dev/null\
    \ || true"
terminal:
- name: hermes
  title: Hermes
  description: Host shell for the email agent (hermes auth, logs, config).
  cwd: /root
