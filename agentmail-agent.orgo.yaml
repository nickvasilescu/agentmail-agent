    \ first (on_resume and the onboarding both do).\nimport json\nimport os\nimport sys\nfrom datetime\
    \ import datetime, timezone\n\nJOBS_FILE = \"/root/.hermes/cron/jobs.json\"\nJOB_ID = \"agentmail-inb01\"\
    \           # any 12+ char path-safe id\nJOB_NAME = \"agentmail-inbox-auto-responder\"\n\nAPI_KEY\
    \ = os.environ.get(\"AGENTMAIL_API_KEY\", \"\").strip()\nINBOX_ID = os.environ.get(\"AGENTMAIL_INBOX_ID\"\
    , \"\").strip()\nINBOX = os.environ.get(\"AGENTMAIL_INBOX\", INBOX_ID).strip()\nMODEL = os.environ.get(\"\
    AGENTMAIL_AGENT_MODEL\", \"openai/gpt-5.5\").strip()\nPROVIDER = os.environ.get(\"AGENTMAIL_AGENT_PROVIDER\"\
    , \"nous\").strip()\n\nif not (API_KEY and INBOX_ID):\n    print(\"[seed-inbox-cron] AgentMail key/inbox\
    \ not both set — skipping cron seed.\")\n    sys.exit(0)\n\nPROMPT = (\n    \"You are the email auto-responder\
    \ for this computer's AgentMail inbox \"\n    f\"({INBOX}). A deterministic helper script does ALL\
    \ the mechanical work \"\n    \"(polling, dedupe ledger, guard rails, sending). You only decide what\
    \ to say.\\n\\n\"\n    \"Identity: a concise, helpful AI assistant with its own cloud computer. \"\
