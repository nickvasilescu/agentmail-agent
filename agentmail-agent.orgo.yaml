api_version: orgo.ai/v1
template:
  name: agentmail-agent
  version: 0.2.3
  description: 'AgentMail Agent — a persistent AI agent whose front door is its own email inbox. One key
    (am_…) and it''s live: the inbox is created automatically and a live WebSocket watches it, so every
    inbound email gets read, worked on, and answered in seconds — no public endpoint, no webhook setup
    (a 5-minute poller covers outages). Hermes runtime, gpt-5.5 via Nous, full computer included.'
  publisher: orgo
  license: MIT
  homepage: https://agentmail.to
  source: https://github.com/agentmail-to/agentmail-examples
hardware:
  cpu: 2
  ram_gb: 4
  disk_gb: 20
  resolution: 1280x720x24
secrets:
- name: agentmail_api_key
  optional: true
  description: AgentMail API key (am_…) — the ONE key this template needs. Set it here and the agent's
    inbox + auto-responder come up with zero touches; otherwise the first-boot setup asks you to paste
    it.
  example: am_...
  docs_url: https://console.agentmail.to
- name: composio_consumer_key
  optional: true
  description: Optional Composio consumer key (ck_…) — sent as the x-consumer-api-key header to the Composio
    MCP (connect.composio.dev/mcp). Unlocks your connected apps (Gmail, Slack, Calendar, Notion, …) as
    tools.
  example: ck_...
  docs_url: https://app.composio.dev
build:
  apt:
  - git
  - xz-utils
  - python3-yaml
  - ripgrep
  - ffmpeg
