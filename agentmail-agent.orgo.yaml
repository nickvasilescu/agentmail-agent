- to: /opt/agentmail-agent/stage/hermes/skills/email/agentmail-inbox/SKILL.md
  inline: "---\nname: agentmail-inbox\ndescription: Operate this computer's own AgentMail inbox — send,\
    \ reply, search, threads, labels, webhooks, custom domains. Use whenever the user (by email or chat)\
    \ asks about the agent's email, sending mail, checking mail, or wiring email into a workflow.\n---\n\
    \n# AgentMail Inbox\n\nThis computer owns a real email inbox, powered by [AgentMail](https://agentmail.to)\n\
    (email infrastructure built for agents — inboxes are API-first, no OAuth dance).\n\n## Your identity\n\
    \n- Your address lives in `~/.hermes/.env` as `AGENTMAIL_INBOX`\n  (and `AGENTMAIL_INBOX_ID`, which\
    \ is the same address, used in API paths).\n- Your API key is `AGENTMAIL_API_KEY` in the same file.\
    \ **Never put the key in\n  an email body or a reply.**\n- A background cron job (`agentmail-inbox-auto-responder`,\
    \ every 1 minute)\n  already answers inbound mail. Don't double-reply to messages it has already\n\
    \  handled — its ledger is `/root/.hermes/state/agentmail_inbox_processed.json`.\n\n## Two ways to\
    \ act\n\n1. **AgentMail MCP** — the `agentmail` MCP server is configured in\n   `~/.hermes/config.yaml`\
    \ (hosted at `https://mcp.agentmail.to/mcp`). Once the\n   key is present its tools cover inboxes,\
    \ messages, threads, drafts, labels.\n   Prefer MCP tools when they're available.\n2. **REST** — `https://api.agentmail.to/v0`\
    \ with header\n   `Authorization: Bearer $AGENTMAIL_API_KEY`. Full endpoint notes in\n   [references/agentmail-api.md](references/agentmail-api.md).\
    \ Use\n   `execute_code` + Python stdlib `urllib` for one-off calls.\n\n## Common moves\n\n- **Send**:\
    \ `POST /v0/inboxes/{inbox_id}/messages/send` with\n  `{\"to\": [\"a@b.com\"], \"subject\": \"…\"\
    , \"text\": \"…\"}`.\n- **Reply in-thread**: `POST /v0/inboxes/{inbox_id}/messages/{message_id}/reply`\n\
    \  with `{\"text\": \"…\"}` (add `\"reply_all\": true` to include everyone).\n- **Check mail**: `GET\
    \ /v0/inboxes/{inbox_id}/messages?limit=20&labels=received`;\n  full body via `GET /v0/inboxes/{inbox_id}/messages/{message_id}`.\n\
    - **Search**: `GET /v0/inboxes/{inbox_id}/messages/search?…` or\n  `/threads/search`.\n- **New inbox**\
    \ (e.g. a role address like sales@): `POST /v0/inboxes` with\n  `{\"username\": \"sales\", \"client_id\"\
    : \"…\"}` — always pass a `client_id` so\n  creation stays idempotent.\n\nURL-encode the inbox id\
    \ in paths — it's an email address (`@` → `%40`).\n\n## Etiquette baked into this agent\n\n- Reply\
    \ in-thread; don't start new threads for answers.\n- Do requested work BEFORE replying; the reply\
    \ carries the result.\n- Plain text (`\"text\"`) is the default; only use `\"html\"` when layout matters.\n\
    - Ignore spam/bounces; never auto-reply to them.\n"
  mode: '0644'
  when: build
- to: /opt/agentmail-agent/stage/hermes/skills/email/agentmail-inbox/references/agentmail-api.md
  inline: "# AgentMail API notes (verified against openapi.json, Jul 2026)\n\n- Base: `https://api.agentmail.to/v0`\
    \ (EU: `https://api.agentmail.eu/v0`)\n- Auth: `Authorization: Bearer <am_… key>` on every request\n\
    - Docs: `https://docs.agentmail.to/llms.txt` (index) /\n  `https://docs.agentmail.to/llms-full.txt`\
    \ (full) /\n  `openapi.json` / `asyncapi.json` (WebSockets)\n- Hosted MCP: `https://mcp.agentmail.to/mcp`\
    \ (`x-api-key` header)\n\n## Inboxes\n\n- `GET  /inboxes` — list (response key: `inboxes`)\n- `POST\
    \ /inboxes` — create; body fields all optional:\n  `username` (random if omitted), `domain` (must\
    \ be verified; default\n  `agentmail.to`), `display_name`, `client_id` (**pass one — makes creation\n\
    \  idempotent**), `metadata`\n- `GET/PATCH/DELETE /inboxes/{inbox_id}` — the `inbox_id` IS the email\n\
    \  address; URL-encode it in paths (`@` → `%40`)\n\n## Messages\n\n- `GET  /inboxes/{inbox_id}/messages`\
    \ — params: `limit`, `page_token`,\n  `labels` (e.g. `received`, `sent`, `unread`), `before`/`after`,\
    \ `from`/`to`/\n  `subject` (substring filters), `ascending`. Response: `{count, messages[]}`\n  ordered\
    \ by timestamp desc; items carry `message_id`, `thread_id`, `labels`,\n  `from`, `to`, `subject`,\
    \ `preview`, `timestamp`.\n- `GET  /inboxes/{inbox_id}/messages/{message_id}` — full message incl.\n\
    \  `text`, `html`, `extracted_text` (new content only — great for replies),\n  `attachments`.\n- `POST\
    \ /inboxes/{inbox_id}/messages/send` — `{to, cc, bcc, subject, text,\n  html, labels, attachments}`\n\
    - `POST /inboxes/{inbox_id}/messages/{message_id}/reply` — `{text, html,\n  reply_all, to, cc, bcc,\
    \ attachments}`; threads automatically.\n- `…/forward`, `…/reply-all`, `…/draft-reply` also exist.\n\
    - `GET /inboxes/{inbox_id}/messages/search?…` and `/threads/search` for search.\n\n## Threads / drafts\
    \ / labels\n\n- `GET /inboxes/{inbox_id}/threads`, `GET /threads/{thread_id}`\n- Drafts: `POST /inboxes/{inbox_id}/drafts`\
    \ → `POST …/drafts/{id}/send`\n- Labels ride on messages (`PATCH …/messages/{id}` with `{add_labels,\n\
    \  remove_labels}` style body — check schema before use)\n\n## Push (for later — the poller cron covers\
    \ v1)\n\n- Webhooks: `POST /webhooks` or `POST /inboxes/{inbox_id}/webhooks`\n  `{url, event_types}`\
    \ — needs a public HTTPS endpoint.\n- WebSockets: see `asyncapi.json` — subscribe to message events\
    \ over WSS,\n  no public endpoint needed. Candidate v2 upgrade for real-time replies.\n\n## Other\
    \ surfaces\n\n- Custom domains: `POST /domains` → DNS zone file → `POST /domains/{id}/verify`\n- Allow/block\
    \ lists: `/lists/{direction}/{type}`\n- Metrics/usage: `/metrics/events`, `/metrics/usage`\n- Pods\
    \ (multi-tenant isolation), per-inbox API keys, `GET /auth/me` (whoami)\n"
  mode: '0644'
  when: build
