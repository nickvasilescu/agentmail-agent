- to: /usr/local/bin/hermes-gateway-run.sh
  inline: '#!/bin/bash

    # ==========================================================================

    # AgentMail Agent — Hermes gateway wrapper (supervised service entrypoint)

    # ==========================================================================

    # Runs as root with HOME=/root and bridges BOTH env files, so the gateway is

    # genuinely supervised, reboot-safe, and sees every key. Stays dormant (not

    # crash-looping) until the baked config exists AND the user has completed the

    # Nous sign-in (`hermes auth` — done by the first-boot onboarding).

    set +e

    export HOME=/root

    export HERMES_HOME=/root/.hermes

    export PATH=/usr/local/bin:/root/.local/bin:/root/.hermes/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH


    until [ -f "$HERMES_HOME/config.yaml" ] && [ -s "$HERMES_HOME/auth.json" ]; do sleep 5; done


    # Source the Orgo vault-injection target (/root/.env — may be absent) and

    # Hermes'' own env so the model-provider auth + the AgentMail key are visible

    # to `hermes gateway run` (it does NOT auto-export either file).

    set -a

    [ -f /root/.env ] && . /root/.env

    [ -f "$HERMES_HOME/.env" ] && . "$HERMES_HOME/.env"

    set +a


    # Exclusive-run lock held for the gateway''s whole lifetime. Field-tested

    # reason: an Orgo boot race can start TWO supervisords, each spawning this

    # service — without the lock the twin gateways SIGTERM each other via

    # --replace every ~2s, forever, and no cron run ever completes. Blocking

    # flock makes the loser wait silently and take over if the winner dies.

    # (Command form, not `exec 200>` — numbered-fd redirection failed with

    # EBADF under supervisord''s exec context. Lock lives in /var/lib/orgo, NOT

    # /var/lock — that''s a dangling symlink to a missing /run/lock on these VMs.)

    mkdir -p /var/lib/orgo

    exec flock /var/lib/orgo/agentmail-gateway.lock hermes gateway run --replace

    '
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-onboard.sh
  inline: "#!/bin/bash\n# ==========================================================================\n\
    # AgentMail Agent — first-boot onboarding (runs on the desktop, once)\n# ==========================================================================\n\
    # Two steps and you have a live email agent:\n#   1. Nous model auth   (device-code — required for\
    \ the agent to think)\n#   2. AgentMail API key (am_… from console.agentmail.to — or pre-set in the\n\
    #      Orgo vault, in which case this step is automatic)\n# Then the inbox is created, the 1-minute\
    \ inbox responder is seeded, the\n# gateway restarts, and the agent's email address is printed. Email\
    \ it.\n#\n# Idempotent: each step is skipped once satisfied; re-running only does\n# what's left.\
    \ Marks a stamp when both steps are done so it stops nagging.\nset +e\nexport HOME=/root\nexport HERMES_HOME=/root/.hermes\n\
    export DISPLAY=\"${DISPLAY:-:99}\"\nexport PATH=/usr/local/bin:/root/.local/bin:/root/.hermes/bin:/usr/bin:/bin:$PATH\n\
    \nENV_FILE=\"$HERMES_HOME/.env\"\nSTAMP=/var/lib/orgo/agentmail-agent-onboarded\nmkdir -p /var/lib/orgo\
    \ \"$HERMES_HOME\"\n\nhr() { printf '\\n\\033[1;36m%s\\033[0m\\n' \"────────────────────────────────────────────────────────\"\
    ; }\nsay() { printf '\\033[1;32m%s\\033[0m\\n' \"$*\"; }\n\nclear 2>/dev/null\nsay \"  AgentMail Agent\
    \ — your email-native AI agent\"\nhr\n\n# --- 1. Nous model auth ----------------------------------------------------\n\
    if [ ! -s \"$HERMES_HOME/auth.json\" ]; then\n  say \"Step 1/2 — Connect your Nous account (model:\
    \ gpt-5.5)\"\n  echo \"A device-code sign-in will start. Follow the URL + code it prints.\"\n  echo\n\
    \  # `hermes auth` (bare) opens a credential-pool menu in v0.18 — call the\n  # provider flow directly\
    \ so the user lands straight in the device-code login.\n  hermes auth add nous --type oauth\n  echo\n\
    else\n  say \"Step 1/2 — Nous account already connected ✓\"\nfi\n\n# --- 2. AgentMail key → inbox\
    \ → responder ----------------------------------\n# Pick up a vault-injected key first so this step\
    \ is zero-touch when the\n# launch set AGENTMAIL_API_KEY.\nset -a\n[ -f /root/.env ] && . /root/.env\n\
    [ -f \"$ENV_FILE\" ] && . \"$ENV_FILE\"\nset +a\n\nif ! grep -q '^AGENTMAIL_API_KEY=..' \"$ENV_FILE\"\
    \ 2>/dev/null && [ -z \"$AGENTMAIL_API_KEY\" ]; then\n  hr\n  say \"Step 2/2 — Connect AgentMail\"\
    \n  echo \"Grab an API key at https://console.agentmail.to (Settings → API keys),\"\n  echo \"then\
    \ paste it here.\"\n  echo\n  printf 'AgentMail API key (am_…): '\n  read -r AM_KEY\n  AM_KEY=\"$(printf\
    \ '%s' \"$AM_KEY\" | tr -d '[:space:]')\"\n  if [ -n \"$AM_KEY\" ]; then\n    grep -vE '^AGENTMAIL_API_KEY='\
    \ \"$ENV_FILE\" > \"$ENV_FILE.tmp\" 2>/dev/null || true\n    mv \"$ENV_FILE.tmp\" \"$ENV_FILE\"\n\
    \    echo \"AGENTMAIL_API_KEY=$AM_KEY\" >> \"$ENV_FILE\"\n    chmod 600 \"$ENV_FILE\"\n    export\
    \ AGENTMAIL_API_KEY=\"$AM_KEY\"\n  fi\nelse\n  say \"Step 2/2 — AgentMail key already present ✓\"\n\
    \  # Make sure a vault-supplied key is persisted where Hermes reads it.\n  if [ -n \"$AGENTMAIL_API_KEY\"\
    \ ] && ! grep -q '^AGENTMAIL_API_KEY=..' \"$ENV_FILE\" 2>/dev/null; then\n    echo \"AGENTMAIL_API_KEY=$AGENTMAIL_API_KEY\"\
    \ >> \"$ENV_FILE\"\n    chmod 600 \"$ENV_FILE\"\n  fi\nfi\n\nif [ -n \"$AGENTMAIL_API_KEY\" ] || grep\
    \ -q '^AGENTMAIL_API_KEY=..' \"$ENV_FILE\" 2>/dev/null; then\n  set -a; . \"$ENV_FILE\"; set +a\n\
    \  python3 /usr/local/bin/agentmail-bootstrap-inbox.py\n  set -a; . \"$ENV_FILE\"; set +a\n  python3\
    \ /usr/local/bin/agentmail-seed-inbox-cron.py\n  # Initialize the dedupe ledger NOW, before we ever\
    \ show the address — an\n  # email arriving before the poller's first tick must count as new, not\
    \ get\n  # absorbed as backlog (bit a real user on day one).\n  python3 /usr/local/bin/agentmail-inbox-helper.py\
    \ poll >/dev/null 2>&1 || true\n  # Enable the MCP servers whose keys now exist (agentmail / composio).\n\
    \  python3 /usr/local/bin/agentmail-sync-mcp.py || true\n  say \"Restarting the gateway so it picks\
    \ everything up…\"\n  supervisorctl restart hermes-gateway 2>/dev/null || true\n  # Kick the WebSocket\
    \ listener too so it picks the key up instantly\n  # instead of on its idle poll.\n  supervisorctl\
    \ restart agentmail-listener 2>/dev/null || true\nfi\n\n# --- Done ------------------------------------------------------------------\n\
    hr\nset -a; [ -f \"$ENV_FILE\" ] && . \"$ENV_FILE\"; set +a\nif [ -s \"$HERMES_HOME/auth.json\" ]\
    \ && [ -n \"$AGENTMAIL_INBOX\" ]; then\n  date -Iseconds > \"$STAMP\"\n  say \"Your agent is LIVE.\
    \ Its email address:\"\n  echo\n  printf '\\033[1;33m    \U0001F4EC  %s\\033[0m\\n' \"$AGENTMAIL_INBOX\"\
    \n  echo\n  echo \"Send it an email right now — replies land in seconds (a live WebSocket\"\n  echo\
    \ \"watches the inbox; a 5-minute poller covers outages), and it has a real\"\n  echo \"computer:\
    \ ask it to research, fetch, summarize, or build.\"\n  echo\n  echo \"Optional extras (paste a key\
    \ in ~/.hermes/.env, or just tell the agent):\"\n  echo \"  • Composio (1000+ apps):  COMPOSIO_CONSUMER_KEY=ck_…\
    \  (app.composio.dev)\"\n  echo \"  • Custom domain: verify it at console.agentmail.to, then ask the\
    \ agent\"\n  echo \"    to create an inbox on it.\"\nelse\n  say \"Setup paused — re-open 'AgentMail\
    \ Agent Setup' from the desktop to finish.\"\nfi\necho\nread -r -p \"Press Enter to close…\" _\n"
  mode: '0755'
  when: build
