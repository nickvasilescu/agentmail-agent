- to: /usr/local/bin/agentmail-bootstrap-inbox.py
  inline: "#!/usr/bin/env python3\n# ==========================================================================\n\
    # AgentMail Agent — idempotent inbox bootstrap\n# ==========================================================================\n\
    # Creates the agent's AgentMail inbox the moment a key is available and pins\n# the address into ~/.hermes/.env\
    \ (AGENTMAIL_INBOX / AGENTMAIL_INBOX_ID) so\n# the gateway, the poller cron, and the agent itself\
    \ all know their address.\n#\n# Idempotent three ways:\n#   - exits 0 immediately if AGENTMAIL_INBOX\
    \ is already pinned,\n#   - creates with a stable per-VM client_id (AgentMail dedupes on client_id),\n\
    #   - falls back to finding an existing inbox with our client_id via GET.\n#\n# Reads AGENTMAIL_API_KEY\
    \ from the process env (callers source /root/.env and\n# ~/.hermes/.env first). Stdlib only — runs\
    \ under any python3.\nimport json\nimport os\nimport re\nimport sys\nimport urllib.error\nimport urllib.request\n\
    \nAPI = \"https://api.agentmail.to/v0\"\nENV_FILE = \"/root/.hermes/.env\"\nUA = \"orgo-agentmail-agent/0.1\
    \ (+https://orgo.ai)\"\n\nkey = os.environ.get(\"AGENTMAIL_API_KEY\", \"\").strip()\nif not key:\n\
    \    print(\"[bootstrap-inbox] AGENTMAIL_API_KEY not set — skipping (will retry next resume).\")\n\
    \    sys.exit(0)\n\nenv_text = \"\"\nif os.path.exists(ENV_FILE):\n    with open(ENV_FILE) as fh:\n\
    \        env_text = fh.read()\nif re.search(r\"^AGENTMAIL_INBOX=..\", env_text, re.M):\n    print(\"\
    [bootstrap-inbox] inbox already pinned in ~/.hermes/.env — nothing to do.\")\n    sys.exit(0)\n\n\n\
    def call(method, path, body=None):\n    req = urllib.request.Request(\n        API + path,\n     \
    \   data=json.dumps(body).encode() if body is not None else None,\n        method=method,\n      \
    \  headers={\n            \"Authorization\": f\"Bearer {key}\",\n            \"Content-Type\": \"\
    application/json\",\n            \"User-Agent\": UA,\n        },\n    )\n    with urllib.request.urlopen(req,\
    \ timeout=30) as resp:\n        return json.load(resp)\n\n\n# Stable per-VM client_id so re-runs (and\
    \ golden re-launches that kept state)\n# converge on the same inbox instead of minting new ones.\n\
    # NOT /etc/machine-id: that is baked into the golden snapshot, so it is\n# IDENTICAL on every VM launched\
    \ from the same golden — all launches would\n# converge on ONE inbox (field-hit: a fresh launch 409'd\
    \ \"Inbox is being\n# deleted\" against a prior VM's tombstoned inbox). This file never exists in\n\
    # the golden (bootstrap only runs at launch), so each VM mints its own once\n# and re-runs on the\
    \ same VM keep it.\nIID_FILE = \"/var/lib/orgo/agentmail-instance-id\"\ntry:\n    with open(IID_FILE)\
    \ as fh:\n        vm = fh.read().strip()\n    if not vm:\n        raise OSError\nexcept OSError:\n\
    \    import uuid\n    vm = uuid.uuid4().hex[:12]\n    os.makedirs(os.path.dirname(IID_FILE), exist_ok=True)\n\
    \    with open(IID_FILE, \"w\") as fh:\n        fh.write(vm)\nclient_id = f\"orgo-agentmail-agent-{vm}\"\
    \n\ninbox = None\ntry:\n    inbox = call(\"POST\", \"/inboxes\", {\n        \"client_id\": client_id,\n\
    \        \"display_name\": \"Orgo Agent\",\n    })\nexcept urllib.error.HTTPError as e:\n    detail\
    \ = \"\"\n    try:\n        detail = json.loads(e.read()).get(\"message\", \"\")\n    except Exception:\
    \  # noqa: BLE001\n        pass\n    print(f\"[bootstrap-inbox] create returned HTTP {e.code}: {detail}\"\
    )\n    # ONLY adopt an existing inbox that carries OUR client_id — never an\n    # arbitrary one (an\
    \ org key can see every inbox in the account, and\n    # auto-responding on someone else's inbox would\
    \ be a disaster).\n    try:\n        listing = call(\"GET\", \"/inboxes\")\n        for ib in listing.get(\"\
    inboxes\", []):\n            if ib.get(\"client_id\") == client_id:\n                inbox = ib\n\
    \                break\n    except Exception as e2:  # noqa: BLE001\n        print(f\"[bootstrap-inbox]\
    \ list fallback failed: {e2}\")\n    if inbox is None and \"limit\" in detail.lower():\n        print(\"\
    [bootstrap-inbox] your AgentMail org is at its inbox limit — \"\n              \"delete an unused\
    \ inbox at console.agentmail.to (or upgrade), \"\n              \"then re-run this setup. Alternatively\
    \ pin an inbox you own by \"\n              \"adding AGENTMAIL_INBOX=<address> and AGENTMAIL_INBOX_ID=<address>\
    \ \"\n              \"to ~/.hermes/.env yourself.\")\nexcept Exception as e:  # noqa: BLE001\n   \
    \ print(f\"[bootstrap-inbox] create failed: {e}\")\n\nif not inbox:\n    print(\"[bootstrap-inbox]\
    \ could not create or find an inbox — will retry next resume.\")\n    sys.exit(0)\n\ninbox_id = inbox.get(\"\
    inbox_id\", \"\")\nemail = inbox.get(\"email\") or inbox_id\nif not inbox_id:\n    print(f\"[bootstrap-inbox]\
    \ unexpected response: {inbox}\")\n    sys.exit(0)\n\nlines = [l for l in env_text.splitlines()\n\
    \         if not l.startswith((\"AGENTMAIL_INBOX=\", \"AGENTMAIL_INBOX_ID=\"))]\nlines += [f\"AGENTMAIL_INBOX={email}\"\
    , f\"AGENTMAIL_INBOX_ID={inbox_id}\"]\ntmp = ENV_FILE + \".tmp\"\nwith open(tmp, \"w\") as fh:\n \
    \   fh.write(\"\\n\".join(lines).rstrip(\"\\n\") + \"\\n\")\nos.replace(tmp, ENV_FILE)\nos.chmod(ENV_FILE,\
    \ 0o600)\n\nprint(f\"[bootstrap-inbox] inbox ready: {email}\")\n"
  mode: '0755'
  when: build
- to: /usr/local/bin/agentmail-seed-inbox-cron.py
  inline: "#!/usr/bin/env python3\n# ==========================================================================\n\
    # AgentMail Agent — seed the inbox auto-responder cron job (fallback path)\n# ==========================================================================\n\
    # Since 0.2.0 the PRIMARY responder trigger is the WebSocket listener\n# (agentmail-inbox-listener.py\
    \ — instant message.received events, no public\n# endpoint). This cron is the degraded-mode fallback:\
    \ every 5 minutes, and\n# `poll --cron` makes it a no-op (zero API calls) while the listener\n# heartbeat\
    \ is fresh. It only actually polls when the socket is down\n# (AgentMail outage, network blip, listener\
    \ crash-loop).\n#\n# Idempotent + self-migrating: seeds when AGENTMAIL_API_KEY +\n# AGENTMAIL_INBOX_ID\
    \ are both present; if the job already exists with the\n# pre-0.2.0 shape (1-minute schedule / prompt\
    \ without --cron) it is updated\n# in place, otherwise left untouched. Callers source /root/.env and\n\
    # ~/.hermes/.env first (on_resume and the onboarding both do).\nimport json\nimport os\nimport sys\n\
    from datetime import datetime, timezone\n\nsys.path.insert(0, \"/usr/local/bin\")\nimport agentmail_inbox_core\
    \ as core  # noqa: E402\n\nJOBS_FILE = \"/root/.hermes/cron/jobs.json\"\nJOB_ID = \"agentmail-inb01\"\
    \           # any 12+ char path-safe id\nJOB_NAME = \"agentmail-inbox-auto-responder\"\n\nAPI_KEY\
    \ = os.environ.get(\"AGENTMAIL_API_KEY\", \"\").strip()\nINBOX_ID = os.environ.get(\"AGENTMAIL_INBOX_ID\"\
    , \"\").strip()\nINBOX = os.environ.get(\"AGENTMAIL_INBOX\", INBOX_ID).strip()\nMODEL = os.environ.get(\"\
    AGENTMAIL_AGENT_MODEL\", \"openai/gpt-5.5\").strip()\nPROVIDER = os.environ.get(\"AGENTMAIL_AGENT_PROVIDER\"\
